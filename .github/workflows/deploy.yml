name: Deploy to Vercel

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [ds-updated]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - run: npx vercel@latest --prod --yes --token=${{ secrets.VERCEL }}
        env:
          VERCEL_ORG_ID: ${{ secrets.TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
