<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Train — 404 background</title>
<!--
  Blueprint Train Animation — standalone embed
  Usage (404 page):
    <iframe src="train-404-bg.html"
      style="position:fixed;inset:0;width:100%;height:100%;
             border:none;pointer-events:none;z-index:0;"
      scrolling="no"></iframe>

  Colors: #141416 ink on transparent / #fafafa paper fill
  Font: JetBrains Mono via Google Fonts (requires internet for labels only)
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
  }
  .vg-wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  svg { display: block; width: 100%; height: 100%; }

  /* ── timing vars ── */
  :root {
    --t-world: 26s; --t-ties: .7s; --t-spin: 1.15s;
    --t-bob: 3s;   --t-jitter: .17s; --t-streak: .9s;
  }

  /* ── animations ── */
  .vg-world { animation: vgworld var(--t-world) linear infinite; }
  .vg-ties  { animation: vgties  var(--t-ties)  linear infinite; }
  .vg-train {
    transform-box: fill-box; transform-origin: center bottom;
    animation: vgbob var(--t-bob) ease-in-out infinite;
  }
  .vg-jitter {
    transform-box: fill-box; transform-origin: center bottom;
    animation: vgjitter var(--t-jitter) steps(2,jump-none) infinite alternate;
  }
  .vg-wheel {
    transform-box: fill-box; transform-origin: center;
    animation: vgspin var(--t-spin) linear infinite;
  }
  .vg-streak { animation: vgstreak var(--t-streak) ease-in infinite; opacity: 0; }

  @keyframes vgworld  { from { transform: translateX(0); } to { transform: translateX(-1200px); } }
  @keyframes vgties   { from { transform: translateX(0); } to { transform: translateX(-1200px); } }
  @keyframes vgspin   { to   { transform: rotate(360deg); } }
  @keyframes vgbob {
    0%,100% { transform: translateY(0)    rotate(0deg);   }
    30%     { transform: translateY(-3px)  rotate(-.22deg); }
    60%     { transform: translateY(0)    rotate(0deg);   }
    80%     { transform: translateY(-1.5px) rotate(.18deg); }
  }
  @keyframes vgjitter {
    from { transform: translateY(0); }
    to   { transform: translateY(.7px); }
  }
  @keyframes vgstreak {
    0%   { transform: translateX(22px);  opacity: 0;   }
    30%  { opacity: .55; }
    100% { transform: translateX(-30px); opacity: 0;   }
  }
</style>
</head>
