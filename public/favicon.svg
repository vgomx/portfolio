<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 562 562">
  <style>
    .bg   { fill: #141416; }
    .mark { fill: #fafafa; }
    @media (prefers-color-scheme: light) {
      .bg   { fill: #fafafa; }
      .mark { fill: #141416; }
    }
  </style>
  <rect class="bg" width="562" height="562" rx="80"/>
  <!-- outer diamond ring, fill-rule evenodd punches the inner hole -->
  <path class="mark" fill-rule="evenodd"
    d="M281,117.5 L552,282.5 L281,444.5 L10,282.5 Z
       M281,166.5 L473,280.5 L281,395.5 L89,280.5 Z"/>
  <!-- pupil -->
  <path class="mark"
    d="M281,206.5 L403,279.5 L281,352.5 L159,279.5 Z"/>
</svg>
