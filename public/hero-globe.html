document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   Vitor Gomes Design System — Colors\n   A light-first, monochrome system. Ink (#141416) on paper\n   (#FAFAFA), a cool neutral gray ramp between them, and ONE\n   reserved accent (green) that is opt-in — off by default.\n   \"Monochrome by default; switch the accent on to bring the\n   reserved green into play.\" Restraint is the brand.\n   ============================================================ */\n\n:root {\n  /* --- Ink → paper ramp (cool neutral grays) --- */\n  --ink-950: #0b0b0c; /* deepest — selection, max contrast */\n  --ink-900: #141416; /* primary ink — text, primary surfaces */\n  --ink-850: #1a1a1d; /* elevated dark surface (menus on dark) */\n  --ink-800: #252528; /* dark hairline / dark hover */\n  --gray-600: #54545a; /* body text / secondary */\n  --gray-500: #717177; /* muted labels */\n  --gray-400: #97979c; /* faint / placeholder / on-dark muted */\n  --gray-300: #bbbbc0; /* disabled text, mute borders */\n  --gray-200: #d6d6d9; /* default borders */\n  --gray-150: #e9e9eb; /* hairline borders, tracks */\n  --gray-100: #efeff0; /* sunken stripe */\n  --gray-50:  #f4f4f5; /* subtle fill / hover tint */\n  --paper:    #fafafa; /* page + card surface */\n  --white:    #ffffff;\n\n  /* --- Reserved accent: GREEN (opt-in) --- */\n  --green-700: #0c1f15; /* ink on green (dark) */\n  --green-600: #2f6f4f; /* accent on LIGHT surfaces */\n  --green-400: #54b084; /* accent on DARK surfaces */\n  --green-tint-light: #eaf1ed;\n  --green-tint-dark:  #16271d;\n\n  /* --- Destructive (single warm red, two tones) --- */\n  --red-600: #a33a2e; /* on light surfaces */\n  --red-400: #e0816f; /* on dark surfaces */\n\n  /* ===========================================================\n     SEMANTIC ALIASES — reference these in components\n     =========================================================== */\n\n  /* Text (on light) */\n  --text-primary:   var(--ink-900);\n  --text-secondary: var(--gray-600);\n  --text-muted:     var(--gray-500);\n  --text-faint:     var(--gray-400);\n  --text-disabled:  var(--gray-300);\n  --text-on-ink:    var(--paper); /* paper text on dark surfaces */\n\n  /* Text (on dark) */\n  --text-inverse-primary: var(--paper);\n  --text-inverse-muted:   var(--gray-400);\n  --text-inverse-faint:   var(--gray-500);\n\n  /* Surfaces */\n  --surface-page:   var(--paper);\n  --surface-card:   var(--paper);\n  --surface-subtle: var(--gray-50);  /* hover tint, selected row */\n  --surface-sunken: var(--gray-100);\n  --surface-ink:    var(--ink-900);  /* dark sections, primary btn */\n  --surface-ink-2:  var(--ink-850);  /* elevated dark (menu) */\n  --surface-ink-3:  var(--ink-800);  /* dark hover / selected */\n\n  /* Borders — edges do the work, not shadows */\n  --border-hairline: var(--gray-150); /* default card / divider */\n  --border-default:  var(--gray-200);\n  --border-mute:     var(--gray-300); /* secondary button outline */\n  --border-strong:   var(--ink-900);  /* emphasis / focused field */\n  --border-on-ink:   var(--ink-800);  /* hairline on dark */\n  --border-on-ink-2: var(--gray-600); /* visible outline on dark */\n\n  /* Accent — MONOCHROME by default (accent === ink) */\n  --accent:           var(--ink-900); /* accent on light surfaces */\n  --accent-ink:       var(--paper);   /* text/icon on the accent */\n  --accent-tint:      var(--gray-50); /* faint accent wash */\n  --accent-on-dark:   var(--paper);   /* accent when on dark surfaces */\n  --accent-on-dark-ink: var(--ink-900);\n  --accent-tint-dark: var(--ink-800);\n\n  /* Feedback */\n  --danger:         var(--red-600);\n  --danger-on-dark: var(--red-400);\n\n  /* Overlay */\n  --scrim: rgba(20, 20, 22, 0.55);\n\n  /* Focus ring — a crisp outline, never a glow */\n  --ring: var(--accent);\n  --ring-width: 2px;\n  --ring-offset: 2px;\n}\n\n/* ============================================================\n   ACCENT SCOPE — opt in to the reserved green by adding\n   data-accent=\"green\" to any container (or <html>).\n   ============================================================ */\n[data-accent=\"green\"] {\n  --accent:           var(--green-600);\n  --accent-ink:       var(--paper);\n  --accent-tint:      var(--green-tint-light);\n  --accent-on-dark:   var(--green-400);\n  --accent-on-dark-ink: var(--green-700);\n  --accent-tint-dark: var(--green-tint-dark);\n  --ring: var(--green-600);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Vitor Gomes Design System — Typography\n   Display + UI + Body : Archivo  (grotesque, tight, confident)\n   Labels / eyebrows / data : JetBrains Mono (uppercase, tracked)\n   One sans, one mono. No serif. The mono is the \"voice\" of the\n   system — it labels everything.\n   ============================================================ */\n\n:root {\n  /* Families */\n  --font-sans: 'Archivo', system-ui, -apple-system, sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;\n  /* --font-display is the same family — Archivo carries display too */\n  --font-display: var(--font-sans);\n\n  /* Weights (Archivo: 300–800) */\n  --fw-light:    300; /* @kind font */\n  --fw-regular:  400; /* @kind font */\n  --fw-medium:   500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:     700; /* @kind font */\n  --fw-extra:    800; /* @kind font */\n\n  /* Type scale (px-derived, matches the component library) */\n  --text-2xs: 0.625rem;  /* 10px — mono micro labels */\n  --text-xs:  0.6875rem; /* 11px — mono eyebrows */\n  --text-sm:  0.8125rem; /* 13px — small UI / mono data */\n  --text-ui:  0.875rem;  /* 14px — button + body-tight + input */\n  --text-base:0.9375rem; /* 15px — section body copy */\n  --text-md:  1.0625rem; /* 17px — accordion ne > svg,\r\n.leaflet-pane > canvas,\r\n.leaflet-zoom-box,\r\n.leaflet-image-layer,\r\n.leaflet-layer {\r\n\tposition: absolute;\r\n\tleft: 0;\r\n\ttop: 0;\r\n\t}\r\n.leaflet-container {\r\n\toverflow: hidden;\r\n\t}\r\n.leaflet-tile,\r\n.leaflet-marker-icon,\r\n.leaflet-marker-shadow {\r\n\t-webkit-user-select: none;\r\n\t   -moz-user-select: none;\r\n\t        user-select: none;\r\n\t  -webkit-user-drag: none;\r\n\t}\r\n/* Prevents IE11 from highlighting tiles in blue */\r\n.leaflet-tile::selection {\r\n\tbackground: transparent;\r\n}\r\n/* Safari renders non-retina tile on retina better with this, but Chrome is worse */\r\n.leaflet-safari .leaflet-tile {\r\n\timage-rendering: -webkit-optimize-contrast;\r\n\t}\r\n/* hack that prevents hw layers \"stretching\" when loading new tiles */\r\n.leaflet-safari .leaflet-tile-container {\r\n\twidth: 1600px;\r\n\theight: 1600px;\r\n\t-webkit-transform-origin: 0 0;\r\n\t}\r\n.leaflet-marker-icon,\r\n.leaflet-marker-shadow {\r\n\tdisplay: block;\r\n\t}\r\n/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */\r\n/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */\r\n.leaflet-container .leaflet-overlay-pane svg {\r\n\tmax-width: none !important;\r\n\tmax-height: none !important;\r\n\t}\r\n.leaflet-container .leaflet-marker-pane img,\r\n.leaflet-container .leaflet-shadow-pane img,\r\n.leaflet-container .leaflet-tile-pane img,\r\n.leaflet-container img.leaflet-image-layer,\r\n.leaflet-container .leaflet-tile {\r\n\tmax-width: none !important;\r\n\tmax-height: none !important;\r\n\twidth: auto;\r\n\tpadding: 0;\r\n\t}\r\n\r\n.leaflet-container img.leaflet-tile {\r\n\t/* See: https://bugs.chromium.org/p/chromium/issues/detail?id=600120 */\r\n\tmix-blend-mode: plus-lighter;\r\n}\r\n\r\n.leaflet-container.leaflet-touch-zoom {\r\n\t-ms-touch-action: pan-x pan-y;\r\n\ttouch-action: pan-x pan-y;\r\n\t}\r\n.leaflet-container.leaflet-touch-drag {\r\n\t-ms-touch-action: pinch-zoom;\r\n\t/* Fallback for FF which doesn't support pinch-zoom */\r\n\ttouch-action: none;\r\n\ttouch-action: pinch-zoom;\r\n}\r\n.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {\r\n\t-ms-touch-action: none;\r\n\ttouch-action: none;\r\n}\r\n.leaflet-container {\r\n\t-webkit-tap-highlight-color: transparent;\r\n}\r\n.leaflet-container a {\r\n\t-webkit-tap-highlight-color: rgba(51, 181, 229, 0.4);\r\n}\r\n.leaflet-tile {\r\n\tfilter: inherit;\r\n\tvisibility: hidden;\r\n\t}\r\n.leaflet-tile-loaded {\r\n\tvisibility: inherit;\r\n\t}\r\n.leaflet-zoom-box {\r\n\twidth: 0;\r\n\theight: 0;\r\n\t-moz-box-sizing: border-box;\r\n\t     box-sizing: border-box;\r\n\tz-index: 800;\r\n\t}\r\n/* workaround for https://bugzilla.mozilla.org/show_bug.cgi?id=888319 */\r\n.leaflet-overlay-pane svg {\r\n\t-moz-user-select: none;\r\n\t}\r\n\r\n.leaflet-pane         { z-index: 400; }\r\n\r\n.leaflet-tile-pane    { z-index: 200; }\r\n.leaflet-overlay-pane { z-index: 400; }\r\n.leaflet-shadow-pane  { z-index: 500; }\r\n.leaflet-marker-pane  { z-index: 600; }\r\n.leaflet-tooltip-pane   { z-index: 650; }\r\n.leaflet-popup-pane   { z-index: 700; }\r\n\r\n.leaflet-map-pane canvas { z-index: 100; }\r\n.leaflet-map-pane svg    { z-index: 200; }\r\n\r\n.leaflet-vml-shape {\r\n\twidth: 1px;\r\n\theight: 1px;\r\n\t}\r\n.lvml {\r\n\tbehavior: url(#default#VML);\r\n\tdisplay: inline-block;\r\n\tposition: absolute;\r\n\t}\r\n\r\n\r\n/* control positioning */\r\n\r\n.leaflet-control {\r\n\tposition: relative;\r\n\tz-index: 800;\r\n\tpointer-events: visiblePainted; /* IE 9-10 doesn't have auto */\r\n\tpointer-events: auto;\r\n\t}\r\n.leaflet-top,\r\n.leaflet-bottom {\r\n\tposition: absolute;\r\n\tz-index: 1000;\r\n\tpointer-events: none;\r\n\t}\r\n.leaflet-top {\r\n\ttop: 0;\r\n\t}\r\n.leaflet-right {\r\n\tright: 0;\r\n\t}\r\n.leaflet-bottom {\r\n\tbottom: 0;\r\n\t}\r\n.leaflet-left {\r\n\tleft: 0;\r\n\t}\r\n.leaflet-control {\r\n\tfloat: left;\r\n\tclear: both;\r\n\t}\r\n.leaflet-right .leaflet-control {\r\n\tfloat: right;\r\n\t}\r\n.leaflet-top .leaflet-control {\r\n\tmargin-top: 10px;\r\n\t}\r\n.leaflet-bottom .leaflet-control {\r\n\tmargin-bottom: 10px;\r\n\t}\r\n.leaflet-left .leaflet-control {\r\n\tmargin-left: 10px;\r\n\t}\r\n.leaflet-right .leaflet-control {\r\n\tmargin-right: 10px;\r\n\t}\r\n\r\n\r\n/* zoom and fade animations */\r\n\r\n.leaflet-fade-anim .leaflet-popup {\r\n\topacity: 0;\r\n\t-webkit-transition: opacity 0.2s linear;\r\n\t   -moz-transition: opacity 0.2s linear;\r\n\t        transition: opacity 0.2s linear;\r\n\t}\r\n.leaflet-fade-anim .leaflet-map-pane .leaflet-popup {\r\n\topacity: 1;\r\n\t}\r\n.leaflet-zoom-animated {\r\n\t-webkit-transform-origin: 0 0;\r\n\t    -ms-transform-origin: 0 0;\r\n\t        transform-origin: 0 0;\r\n\t}\r\nsvg.leaflet-zoom-animated {\r\n\twill-change: transform;\r\n}\r\n\r\n.leaflet-zoom-anim .leaflet-zoom-animated {\r\n\t-webkit-transition: -webkit-transform 0.25s cubic-bezier(0,0,0.25,1);\r\n\t   -moz-transition:    -moz-transform 0.25s cubic-bezier(0,0,0.25,1);\r\n\t        transition:         transform 0.25s cubic-bezier(0,0,0.25,1);\r\n\t}\r\n.leaflet-zoom-anim .leaflet-tile,\r\n.leaflet-pan-anim .leaflet-tile {\r\n\t-webkit-transition: none;\r\n\t   -moz-transition: none;\r\n\t        transition: none;\r\n\t}\r\n\r\n.leaflet-zoom-anim .leaflet-zoom-hide {\r\n\tvisibility: hidden;\r\n\t}\r\n\r\n\r\n/* cursors */\r\n\r\n.leaflet-interactive {\r\n\tcursor: pointer;\r\n\t}\r\n.leaflet-grab {\r\n\tcursor: -webkit-grab;\r\n\tcursor:    -moz-grab;\r\n\tcursor:         grab;\r\n\t}\r\n.leaflet-crosshair,\r\n.leaflet-crosshair .leaflet-interactive {\r\n\tcursor: crosshair;\r\n\t}\r\n.leaflet-popup-pane,\r\n.leaflet-control {\r\n\tcursor: auto;\r\n\t}\r\n.leaflet-dragging .leaflet-grab,\r\n.leaflet-dragging .leaflet-grab .leaflet-interactive,\r\n.leaflet-dragging .leaflet-marker-draggable {\r\n\tcursor: move;\r\n\tcursor: -webkit-grabbing;\r\n\tcursor:    -moz-grabbing;\r\n\tcursor:  legSpRef = React.createRef();\n  legSantosRef = React.createRef();\n  legAmsRef = React.createRef();\n\n  SP = [-23.5505, -46.6333];\n  SANTOS = [-23.9608, -46.3331];\n  AMS = [52.3676, 4.9041];\n\n  renderVals() {\n    const accentAttr = (this.props.accent === 'ink') ? 'mono' : 'green';\n    return {\n      accentAttr,\n      rootRef: this.rootRef, stageRef: this.stageRef, mapRef: this.mapRef, svgRef: this.svgRef,\n      hopRef: this.hopRef, arcRef: this.arcRef, hopDimRef: this.hopDimRef, arcDimRef: this.arcDimRef,\n      dotRef: this.dotRef, pulseRef: this.pulseRef, pulseRingRef: this.pulseRingRef,\n      spRef: this.spRef, santosRef: this.santosRef, amsRef: this.amsRef,\n      legSpRef: this.legSpRef, legSantosRef: this.legSantosRef, legAmsRef: this.legAmsRef\n    };\n  }\n\n  gc(a, b, n) {\n    const toR = Math.PI / 180, toD = 180 / Math.PI;\n    const la1 = a[0] * toR, lo1 = a[1] * toR, la2 = b[0] * toR, lo2 = b[1] * toR;\n    const d = 2 * Math.asin(Math.sqrt(\n      Math.sin((la1 - la2) / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin((lo1 - lo2) / 2) ** 2));\n    const pts = [];\n    for (let i = 0; i <= n; i++) {\n      const f = i / n;\n      if (d < 1e-9) { pts.push([a[0], a[1]]); continue; }\n      const A = Math.sin((1 - f) * d) / Math.sin(d);\n      const B = Math.sin(f * d) / Math.sin(d);\n      const x = A * Math.cos(la1) * Math.cos(lo1) + B * Math.cos(la2) * Math.cos(lo2);\n      const y = A * Math.cos(la1) * Math.sin(lo1) + B * Math.cos(la2) * Math.sin(lo2);\n      const z = A * Math.sin(la1) + B * Math.sin(la2);\n      pts.push([Math.atan2(z, Math.sqrt(x * x + y * y)) * toD, Math.atan2(y, x) * toD]);\n    }\n    return pts;\n  }\n\n  componentDidMount() {\n    this.hopPts = this.gc(this.SP, this.SANTOS, 16);\n    this.arcPts = this.gc(this.SANTOS, this.AMS, 180);\n    this.hopProg = 0; this.arcProg = 0; this.pulseProg = 0;\n    this.dotVisible = false; this.showHopDim = false; this.showArcDim = false;\n    this._gen = 0; this._dead = false; t
